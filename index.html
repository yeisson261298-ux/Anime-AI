<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AnimeAI — Conviértete en Anime</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal: #00c9b1;
      --cyan: #00aedc;
      --sky: #48cae4;
      --dark: #0a1520;
      --card: #0f2030;
      --text: #e8f8ff;
      --muted: #7ab8cc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0,201,177,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0,174,220,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(72,202,228,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 20px 40px;
    }
    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(3rem, 10vw, 6rem);
      background: linear-gradient(135deg, var(--teal), var(--cyan), var(--sky));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 4px;
      line-height: 1;
    }
    .tagline { font-size: 1.1rem; color: var(--muted); margin-top: 10px; font-weight: 600; }
    main {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }
    .upload-card {
      background: var(--card);
      border: 2px dashed rgba(0,201,177,0.4);
      border-radius: 24px;
      padding: 50px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .upload-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,201,177,0.05), rgba(0,174,220,0.05));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .upload-card:hover::before, .upload-card.drag-over::before { opacity: 1; }
    .upload-card:hover, .upload-card.drag-over { border-color: var(--teal); transform: translateY(-2px); }
    .upload-icon { font-size: 4rem; margin-bottom: 16px; display: block; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .upload-title { font-size: 1.4rem; font-weight: 900; color: var(--text); margin-bottom: 8px; }
    .upload-sub { color: var(--muted); font-size: 0.95rem; }
    .upload-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(0,201,177,0.4);
    }
    .upload-btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(0,201,177,0.6); }
    #fileInput { display: none; }
    #preview-section { display: none; margin-top: 30px; }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .preview-box { background: var(--card); border-radius: 16px; overflow: hidden; position: relative; }
    .preview-label {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7); padding: 4px 12px;
      border-radius: 20px; font-size: 0.8rem; font-weight: 700;
      color: var(--text); z-index: 2;
    }
    .preview-box img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .placeholder-anime {
      width: 100%; aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(0,201,177,0.08), rgba(0,174,220,0.08));
      color: var(--muted); font-size: 0.9rem; gap: 10px;
    }
    .placeholder-anime span { font-size: 3rem; }
    #convert-btn {
      display: none; width: 100%; margin-top: 24px; padding: 18px;
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      border: none; border-radius: 16px;
      font-family: 'Bebas Neue', cursive; font-size: 1.6rem;
      letter-spacing: 3px; color: white; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 6px 30px rgba(0,201,177,0.4);
    }
    #convert-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,201,177,0.6); }
    #convert-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .loading-bar { display: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 16px; overflow: hidden; }
    .loading-bar.active { display: block; }
    .loading-bar::after {
      content: ''; display: block; height: 100%; width: 40%;
      background: linear-gradient(90deg, var(--teal), var(--sky));
      border-radius: 4px; animation: slide 1.5s ease-in-out infinite;
    }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    .status-text { text-align: center; margin-top: 12px; color: var(--muted); font-size: 0.95rem; min-height: 24px; }
    #download-btn {
      display: none; width: 100%; margin-top: 16px; padding: 16px;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      border: none; border-radius: 16px;
      font-family: 'Bebas Neue', cursive; font-size: 1.4rem;
      letter-spacing: 3px; color: white; cursor: pointer; transition: all 0.3s;
    }
    #download-btn:hover { transform: translateY(-2px); }
    .error-msg {
      display: none; background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3); border-radius: 12px;
      padding: 14px 20px; margin-top: 16px; color: #ff9090;
      font-size: 0.95rem; text-align: center;
    }
    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
    .feature { background: var(--card); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid rgba(0,201,177,0.1); }
    .feature-icon { font-size: 2rem; margin-bottom: 8px; }
    .feature-title { font-weight: 700; font-size: 0.9rem; }
    .feature-sub { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
    @media (max-width: 500px) {
      .preview-grid { grid-template-columns: 1fr; }
      .features { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">✨ AnimeAI</div>
    <p class="tagline">Sube tu foto y conviértete en un personaje de anime con IA</p>
  </header>
  <main>
    <div class="upload-card" id="dropZone">
      <span class="upload-icon">🌊</span>
      <div class="upload-title">Sube tu foto aquí</div>
      <p class="upload-sub">JPG, PNG o WEBP · Máximo 5MB</p>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Elegir foto</button>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp"/>
    </div>
    <div id="preview-section">
      <div class="preview-grid">
        <div class="preview-box">
          <span class="preview-label">📷 Original</span>
          <img id="originalImg" src="" alt="Original"/>
        </div>
        <div class="preview-box">
          <span class="preview-label">🎌 Anime</span>
          <div class="placeholder-anime" id="animePlaceholder">
            <span>🎨</span>
            Aquí aparecerá tu versión anime
          </div>
          <img id="animeImg" src="" alt="Anime" style="display:none"/>
        </div>
      </div>
      <button id="convert-btn" onclick="convertToAnime()">🎌 ¡Convertir a Anime!</button>
      <div class="loading-bar" id="loadingBar"></div>
      <div class="status-text" id="statusText"></div>
      <div class="error-msg" id="errorMsg"></div>
      <button id="download-btn" onclick="downloadAnime()">⬇️ Descargar imagen anime</button>
    </div>
    <div class="features">
      <div class="feature"><div class="feature-icon">⚡</div><div class="feature-title">Rápido</div><div class="feature-sub">Resultados en segundos</div></div>
      <div class="feature"><div class="feature-icon">🎨</div><div class="feature-title">Alta calidad</div><div class="feature-sub">IA de última generación</div></div>
      <div class="feature"><div class="feature-icon">🔒</div><div class="feature-title">Privado</div><div class="feature-sub">Tu foto no se guarda</div></div>
    </div>
  </main>
  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    let selectedFile = null, animeUrl = null;
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    function handleFile(file) {
      if (file.size > 5 * 1024 * 1024) { alert('La imagen es muy grande. Máximo 5MB.'); return; }
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('originalImg').src = e.target.result;
        document.getElementById('preview-section').style.display = 'block';
        document.getElementById('convert-btn').style.display = 'block';
        document.getElementById('animeImg').style.display = 'none';
        document.getElementById('animePlaceholder').style.display = 'flex';
        document.getElementById('download-btn').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('statusText').textContent = '';
        animeUrl = null;
      };
      reader.readAsDataURL(file);
    }
    async function convertToAnime() {
      if (!selectedFile) return;
      const btn = document.getElementById('convert-btn');
      const loadingBar = document.getElementById('loadingBar');
      const statusText = document.getElementById('statusText');
      const errorMsg = document.getElementById('errorMsg');
      btn.disabled = true; btn.textContent = '⏳ Procesando...';
      loadingBar.classList.add('active');
      statusText.textContent = 'Enviando imagen a la IA...';
      errorMsg.style.display = 'none';
      const formData = new FormData();
      formData.append('image', selectedFile);
      try {
        statusText.textContent = 'Generando tu versión anime... ✨';
        const response = await fetch('/api/anime', { method: 'POST', body: formData });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Error al procesar');
        animeUrl = data.imageUrl;
        document.getElementById('animeImg').src = animeUrl;
        document.getElementById('animeImg').style.display = 'block';
        document.getElementById('animePlaceholder').style.display = 'none';
        document.getElementById('download-btn').style.display = 'block';
        statusText.textContent = '🎉 ¡Listo! Tu versión anime está lista.';
      } catch (err) {
        errorMsg.textContent = '❌ ' + err.message;
        errorMsg.style.display = 'block';
        statusText.textContent = '';
      } finally {
        btn.disabled = false; btn.textContent = '🎌 ¡Convertir a Anime!';
        loadingBar.classList.remove('active');
      }
    }
    function downloadAnime() {
      if (!animeUrl) return;
      const a = document.createElement('a');
      a.href = animeUrl; a.download = 'mi-anime.png'; a.click();
    }
  </script>
</body>
</html>
